<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPIKEHOST | ابدأ مشروعك</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* خلفية متدرجة احترافية */
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            overflow: hidden;
            text-align: center;
        }

        .container {
            padding: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        .logo-text {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 5px;
            margin-bottom: 10px;
            color: #e94560;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        p {
            font-size: 1.2rem;
            color: #bdc3c7;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* تصميم الزر المطلوب */
        .start-btn {
            display: inline-block;
            padding: 18px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            text-decoration: none;
            background-color: #e94560;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(233, 69, 96, 0.3);
            border: 2px solid transparent;
        }

        .start-btn:hover {
            transform: translateY(-5px);
            background-color: transparent;
            border-color: #e94560;
            box-shadow: 0 15px 30px rgba(233, 69, 96, 0.5);
        }

        /* حركة بسيطة لظهور المحتوى */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تأثير خلفية متحركة خفيفة */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(233, 69, 96, 0.1);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
            top: 20%;
            left: 30%;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <div class="logo-text">SPIKEHOST</div>
        <p>مستقبلك الرقمي يبدأ بضغطة زر واحدة.</p>
        
        <a href="site.html" class="start-btn">ابدأ إنشاء موقعك</a>
    </div>

</body>
</html>
